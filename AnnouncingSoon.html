<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Announcing Soon | Bee Infinity Groups</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* ENTER SCREEN */
#enter-screen{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  cursor:pointer;
}

.enter-text{
  color:#fff;
  font-size:22px;
  letter-spacing:4px;
  border:1px solid #fff;
  padding:15px 30px;
  transition:0.3s;
}

.enter-text:hover{
  background:#fff;
  color:#000;
}

@media(max-width:768px){
  .enter-text{
    font-size:16px;
    padding:12px 20px;
  }
}

/* BACK BUTTON */
.back-btn{
  position:absolute;
  top:20px;
  left:20px;
  padding:10px 18px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  font-size:12px;
  letter-spacing:1px;
  z-index:10;
  transition:0.3s;
}
.back-btn:hover{
  background:#fff;
  color:#000;
}

/* HERO */
.hero{
  height:100vh;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* VIDEO */
video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center,
    rgba(0,0,0,0.6),
    rgba(0,0,0,0.9)
  );
  z-index:-1;
}

/* CONTENT */
.hero-content{
  max-width:700px;
  width:100%;
  z-index:2;
  padding:0 20px;
}

/* LOGO */
.logo{
  width:100%;
  display:flex;
  justify-content:center;
  margin-bottom:-10px;
}

.logo img{
  width:500px;
  max-width:90%;
  opacity:0.95;
  filter: drop-shadow(0 0 25px rgba(255,255,255,0.15));
}

/* TITLE */
.hero h1{
  font-size:60px;
  font-weight:900;
  margin-bottom:15px;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

/* DESC */
.hero p{
  font-size:18px;
  color:#ddd;
  margin-bottom:30px;
  opacity:0;
  transform:translateY(40px);
  transition:1.2s;
}

/* BUTTON */
.btn{
  display:inline-block;
  padding:14px 30px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
  transition:0.4s;
}
.btn:hover{
  background:#fff;
  color:#000;
}

/* PARTICLES */
#particles{
  position:absolute;
  width:100%;
  height:100%;
  z-index:0;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#aaa;
  font-size:12px;
}

/* MOBILE */
@media (max-width:768px){
  .back-btn{
    top:15px;
    left:15px;
    padding:8px 14px;
    font-size:10px;
  }

  .logo img{
    width:240px;
  }

  .hero h1{
    font-size:34px;
  }

  .hero p{
    font-size:14px;
  }

  .btn{
    padding:10px 20px;
    font-size:12px;
  }
}

@media (max-width:400px){
  .logo img{
    width:180px;
  }

  .hero h1{
    font-size:26px;
  }

  .hero p{
    font-size:12px;
  }
}

</style>
</head>

<body>

<div id="enter-screen">
  <div class="enter-text">TAP TO ENTER</div>
</div>

<audio id="bg-music" loop playsinline>
  <source src="assets/sounds/botd_bg-music.mp3" type="audio/mpeg">
</audio>

<a href="index.html" class="back-btn">← HOME</a>

<section class="hero">

  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-dancing-people-1573/1080p.mp4">
  </video>

  <canvas id="particles"></canvas>

  <div class="hero-content">

    <div class="logo">
      <img src="assets/images/botd/Final_BOTD_Logo.webp">
    </div>

    <h1 class="reveal">ANNOUNCING SOON</h1>

    <p class="reveal">India’s premier dance platform by Bee Infinity Groups.</p>

    <a href="#" class="btn reveal">Stay Tuned</a>

  </div>

</section>

<div class="footer">© Bee Infinity Groups</div>

<script>

/* REVEAL */
window.addEventListener("load", ()=>{
  document.querySelectorAll('.reveal').forEach(el=>{
    el.style.opacity=1;
    el.style.transform="translateY(0)";
  });
});

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

/* MUSIC */
const music = document.getElementById("bg-music");
const enterScreen = document.getElementById("enter-screen");

enterScreen.addEventListener("click", () => {

  music.volume = 0;
  music.play();

  let vol = 0;
  const fade = setInterval(()=>{
    if(vol < 0.6){
      vol += 0.05;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  },150);

  enterScreen.style.opacity = "0";
  enterScreen.style.pointerEvents = "none";

  setTimeout(()=>{
    enterScreen.style.display = "none";
  },500);

});

</script>

</body>
</html>
