<style>

/* =========================
   BASE
========================= */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #0a0f1c, #05070d);
  color: #fff;
  overflow: hidden;
}

/* =========================
   BACK BUTTON
========================= */
.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  text-decoration: none;
  color: #fff;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: 30px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
}

/* =========================
   HERO
========================= */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  text-align: center;
}

.hero h1 {
  font-size: 52px;
  letter-spacing: 4px;
  margin-bottom: 10px;
}

.hero p {
  color: #aaa;
  margin-bottom: 30px;
}

/* =========================
   WHATSAPP BUTTON
========================= */
.whatsapp-btn {
  padding: 14px 26px;
  border-radius: 30px;
  background: linear-gradient(45deg, #25D366, #128C7E);
  color: #fff;
  text-decoration: none;
  font-weight: bold;
  letter-spacing: 1px;
  transition: 0.3s ease;
}

.whatsapp-btn:hover {
  transform: translateY(-3px);
}

/* =========================
   FLOATING ICONS
========================= */
.floating-icons span {
  position: absolute;
  font-size: 28px;
  opacity: 0.15;
  animation: float 10s infinite ease-in-out;
}

.icon1 { top: 10%; left: 15%; }
.icon2 { top: 20%; right: 10%; }
.icon3 { bottom: 20%; left: 20%; }
.icon4 { bottom: 15%; right: 15%; }
.icon5 { top: 40%; left: 5%; }
.icon6 { bottom: 10%; left: 50%; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}

/* =========================
   PARTICLES
========================= */
.particles {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: -1;
}

.particles span {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #f2c400;
  border-radius: 50%;
  animation: particleMove 10s linear infinite;
}

@keyframes particleMove {
  0% { transform: translateY(100vh); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

.particles span:nth-child(1){ left:10%; animation-delay:0s;}
.particles span:nth-child(2){ left:30%; animation-delay:2s;}
.particles span:nth-child(3){ left:50%; animation-delay:4s;}
.particles span:nth-child(4){ left:70%; animation-delay:1s;}
.particles span:nth-child(5){ left:90%; animation-delay:3s;}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:768px){
  .hero h1 { font-size: 32px; }
}

</style>
